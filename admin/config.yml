backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
    - name: "jobs"
    label: "Jobs Updates"
    folder: "_jobs"
    create: true
    fields:
            - label: "Title"
        name: "title"
        widget: "string"
            - label: "Date"
        name: "date"
        widget: "datetime"
            - label: "Description"
        name: "body"
        widget: "markdown"
